<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Traffic — ศูนย์จราจรอัจฉริยะ เขตอุตสาหกรรม</title>
    <script>
      // ตั้งธีมก่อน render เพื่อไม่ให้หน้ากะพริบ (ค่าที่ผู้ใช้เลือกเก็บใน localStorage)
      document.documentElement.dataset.theme =
        localStorage.getItem("dashboard-theme") || "light";
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <script>
      // สีทั้งหมดอ้างอิง CSS variables (RGB triplet) เพื่อรองรับการสลับธีม dark/light
      const twVar = (name) => `rgb(var(--tw-${name}) / <alpha-value>)`;
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              page: twVar("page"),
              surface: twVar("surface"),
              surface2: twVar("surface2"),
              ink: twVar("ink"),
              ink2: twVar("ink2"),
              muted: twVar("muted"),
              grid: twVar("grid"),
              line: twVar("line"),
              s1: twVar("s1"),
              s2: twVar("s2"),
              s3: twVar("s3"),
              s5: twVar("s5"),
              good: twVar("good"),
              warn: twVar("warn"),
              serious: twVar("serious"),
              crit: twVar("crit"),
            },
            fontFamily: {
              sans: [
                '"Noto Sans Thai"',
                "system-ui",
                "-apple-system",
                '"Segoe UI"',
                "sans-serif",
              ],
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-page text-ink font-sans antialiased">
    <!-- ส่วน Header (แชร์ทุกหน้า มีแถบสลับหน้าในตัว) -->
    <div data-include="partials/header.html"></div>

    <main class="max-w-[1600px] mx-auto px-4 py-4 space-y-4">
      <!-- แถบสถานะการโหลด / ข้อผิดพลาด -->
      <div
        id="load-status"
        class="hidden rounded-xl border border-crit/40 bg-crit/10 px-4 py-3 text-sm text-ink2"
      ></div>

      <!-- แบนเนอร์แจ้งเตือน + KPI บริหารจัดการจราจร -->
      <div data-include="partials/traffic-banner.html"></div>

      <!-- แผนที่จราจร (หลัก) + แผงติดตามรถ GPS / LPR -->
      <div class="grid grid-cols-1 xl:grid-cols-3 gap-4">
        <div
          class="xl:col-span-2"
          data-include="partials/traffic-map.html"
        ></div>
        <div data-include="partials/vehicle-track-panel.html"></div>
      </div>

      <!-- แผงควบคุมภาพ CCTV สด (เต็มความกว้าง) -->
      <div data-include="partials/cctv-wall.html"></div>

      <!-- ปริมาณจราจรรายชั่วโมง + เหตุการณ์/ความปลอดภัย + ศูนย์บริหารจัดการ -->
      <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4">
        <div data-include="partials/traffic-flow-panel.html"></div>
        <div data-include="partials/traffic-incident-panel.html"></div>
        <div
          class="lg:col-span-2 xl:col-span-1"
          data-include="partials/traffic-mgmt-panel.html"
        ></div>
      </div>

      <footer class="py-6 text-center text-xs text-muted">
        ระบบ Smart Traffic เขตอุตสาหกรรม · ข้อมูลจำลองเพื่อการสาธิต (วิดีโอ
        CCTV: สื่อเสรีจาก Wikimedia Commons) · อัปเดตล่าสุด
        <span id="footer-updated">—</span>
      </footer>
    </main>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/dataService.js"></script>
    <script src="js/components/spark.js"></script>
    <script src="js/components/themeToggle.js"></script>
    <script src="js/components/header.js"></script>
    <script src="js/components/trafficMap.js"></script>
    <script src="js/components/cctvWall.js"></script>
    <script src="js/components/vehicleTrackPanel.js"></script>
    <script src="js/components/trafficKpiPanel.js"></script>
    <script src="js/components/trafficFlowPanel.js"></script>
    <script src="js/components/trafficIncidentPanel.js"></script>
    <script src="js/components/trafficMgmtPanel.js"></script>
    <script src="js/trafficMain.js"></script>
  </body>
</html>
