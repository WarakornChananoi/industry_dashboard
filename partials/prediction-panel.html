<section class="card p-4 flex flex-col">
  <div class="flex flex-wrap items-start justify-between gap-2 mb-1">
    <div>
      <h2 class="card-title">AI คาดการณ์ระดับน้ำล่วงหน้า 12 ชั่วโมง</h2>
      <p id="prediction-model" class="card-sub">—</p>
    </div>
    <select id="prediction-station"
      class="bg-surface2 border border-line/10 text-ink2 text-xs rounded-lg px-2.5 py-1.5 focus:outline-none focus:border-s1/60"></select>
  </div>

  <!-- แถบสรุปภาพรวมสถานการณ์จาก AI -->
  <div id="prediction-headline" class="mt-2"></div>

  <div id="prediction-risk" class="my-3"></div>

  <div class="relative h-[250px]">
    <canvas id="prediction-chart"></canvas>
  </div>

  <div id="prediction-rain" class="mt-3 flex items-center gap-3 rounded-lg bg-surface2 border border-line/10 px-3 py-2 text-xs text-ink2"></div>

  <!-- ตารางสรุปทุกจุดเฝ้าระวังน้ำท่วม -->
  <div class="mt-4">
    <h3 class="text-xs font-medium text-ink2 mb-2">ทุกจุดเฝ้าระวังน้ำท่วม <span class="text-muted font-normal">· คลิกเพื่อดูกราฟรายสถานี</span></h3>
    <div class="overflow-x-auto">
      <table class="tbl">
        <thead>
          <tr>
            <th>จุดเฝ้าระวัง</th>
            <th class="num">ปัจจุบัน (ม.)</th>
            <th class="num">คาดสูงสุด (ม.)</th>
            <th>คาดถึงเกณฑ์วิกฤต</th>
            <th>ความเสี่ยง</th>
          </tr>
        </thead>
        <tbody id="prediction-stations-table"></tbody>
      </table>
    </div>
  </div>
</section>
