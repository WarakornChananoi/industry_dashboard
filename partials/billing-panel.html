<section class="card p-4">
  <div class="flex flex-wrap items-start justify-between gap-2 mb-3">
    <div>
      <h2 class="card-title">Meter Billing System — ค่าน้ำตามการใช้งานจริง</h2>
      <p id="billing-period" class="card-sub">—</p>
    </div>
    <div id="billing-summary" class="flex flex-wrap gap-2"></div>
  </div>

  <!-- แถบสรุปการเงินรอบบิล -->
  <div id="billing-stats" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-5 gap-3 mb-4"></div>

  <div class="grid grid-cols-1 xl:grid-cols-5 gap-4">
    <!-- ซ้าย: กราฟการใช้น้ำรายอาคาร + สัดส่วนตามโซน -->
    <div class="xl:col-span-2 flex flex-col gap-4">
      <div>
        <h3 class="text-xs font-medium text-ink2 mb-2">ปริมาณการใช้น้ำรอบบิลล่าสุด (ลบ.ม.)</h3>
        <div class="relative h-[300px]">
          <canvas id="billing-chart"></canvas>
        </div>
      </div>

      <div class="rounded-lg bg-surface2 border border-line/10 p-3">
        <h3 class="text-xs font-medium text-ink2 mb-2">สัดส่วนการใช้น้ำตามโซนอุตสาหกรรม</h3>
        <div class="flex items-center gap-4">
          <div class="relative h-[150px] w-[150px] shrink-0">
            <canvas id="billing-zone-chart"></canvas>
          </div>
          <div id="billing-zone-legend" class="grow text-xs space-y-2"></div>
        </div>
      </div>
    </div>

    <!-- ขวา: ตารางบิลรายอาคาร -->
    <div class="xl:col-span-3 overflow-x-auto">
      <table class="tbl">
        <thead>
          <tr>
            <th>อาคาร / บริษัท</th>
            <th>ประเภทกิจการ</th>
            <th class="num">ใช้น้ำ (ลบ.ม.)</th>
            <th class="num">ยอดบิล (บาท)</th>
            <th>สถานะบิล</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="billing-table"></tbody>
      </table>
    </div>
  </div>

  <!-- ล่าง: แนวโน้มการใช้น้ำรวมทั้งเขต 14 วันล่าสุด -->
  <div class="mt-4 rounded-lg bg-surface2 border border-line/10 p-3">
    <div class="flex flex-wrap items-start justify-between gap-2 mb-2">
      <h3 class="text-xs font-medium text-ink2">แนวโน้มการใช้น้ำรวมทั้งเขต (14 วันล่าสุด)</h3>
      <div id="billing-trend-meta" class="text-[11px] text-muted"></div>
    </div>
    <div class="relative h-[200px]">
      <canvas id="billing-trend-chart"></canvas>
    </div>
  </div>
</section>
